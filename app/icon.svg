<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#E6E2D3"/>

  <!-- connecting lines from gear to satellites -->
  <g stroke="#BF4E6B" stroke-width="3" stroke-linecap="round">
    <line x1="50" y1="50" x2="22" y2="22"/>
    <line x1="50" y1="50" x2="82" y2="28"/>
    <line x1="50" y1="50" x2="72" y2="82"/>
  </g>

  <!-- satellite nodes -->
  <circle cx="22" cy="22" r="8" fill="#BF4E6B"/>
  <circle cx="82" cy="28" r="6.5" fill="#BF4E6B"/>
  <circle cx="72" cy="82" r="9" fill="#BF4E6B"/>

  <!-- gear: teeth (8) -->
  <g fill="#BF4E6B" transform="translate(50 50)">
    <rect x="-3" y="-23" width="6" height="7" rx="0.5"/>
    <rect x="-3" y="-23" width="6" height="7" rx="0.5" transform="rotate(45)"/>
    <rect x="-3" y="-23" width="6" height="7" rx="0.5" transform="rotate(90)"/>
    <rect x="-3" y="-23" width="6" height="7" rx="0.5" transform="rotate(135)"/>
    <rect x="-3" y="-23" width="6" height="7" rx="0.5" transform="rotate(180)"/>
    <rect x="-3" y="-23" width="6" height="7" rx="0.5" transform="rotate(225)"/>
    <rect x="-3" y="-23" width="6" height="7" rx="0.5" transform="rotate(270)"/>
    <rect x="-3" y="-23" width="6" height="7" rx="0.5" transform="rotate(315)"/>
  </g>

  <!-- gear body ring -->
  <circle cx="50" cy="50" r="15.5" fill="none" stroke="#BF4E6B" stroke-width="5"/>

  <!-- inner hub (cream center) -->
  <circle cx="50" cy="50" r="6.5" fill="#E6E2D3"/>

  <!-- center axle dot -->
  <circle cx="50" cy="50" r="2.2" fill="#BF4E6B"/>
</svg>
